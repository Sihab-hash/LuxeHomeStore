<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your shopping cart — LuxeHomeStore.">
  <title>Cart — LuxeHomeStore</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-hero{padding:140px 0 60px;background:linear-gradient(135deg,#1A1A2E,#16213E);text-align:center;position:relative;overflow:hidden}
    .page-hero h1{font-family:var(--font-heading);font-size:2.8rem;margin-bottom:12px}
    .breadcrumb{display:flex;gap:8px;justify-content:center;color:var(--text-muted);font-size:0.9rem}
    .breadcrumb a{color:var(--primary-light)}
    .cart-layout{display:grid;grid-template-columns:1fr 380px;gap:32px;padding:48px 0 80px}
    .cart-items{display:flex;flex-direction:column;gap:16px}
    .cart-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 40px;gap:16px;padding:12px 20px;color:var(--text-muted);font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;font-weight:600;border-bottom:1px solid var(--border)}
    .cart-item{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 40px;gap:16px;align-items:center;padding:20px;background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);transition:var(--transition)}
    .cart-item:hover{border-color:rgba(232,114,42,0.2)}
    .item-info{display:flex;gap:16px;align-items:center}
    .item-info img{width:80px;height:80px;object-fit:cover;border-radius:var(--radius-sm)}
    .item-info h4{font-size:0.95rem;font-weight:600;margin-bottom:4px}
    .item-info span{font-size:0.8rem;color:var(--text-muted)}
    .item-price{font-weight:600;color:var(--primary-light)}
    .item-qty{display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;width:fit-content}
    .item-qty button{width:32px;height:32px;background:var(--bg-surface);color:var(--text-white);border:none;cursor:pointer;font-size:0.9rem;transition:var(--transition)}
    .item-qty button:hover{background:var(--primary)}
    .item-qty input{width:40px;height:32px;text-align:center;background:transparent;border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);color:var(--text-white);font-family:var(--font-body);font-size:0.85rem}
    .item-total{font-weight:700;color:var(--text-white)}
    .item-remove{width:36px;height:36px;border-radius:50%;background:rgba(231,76,60,0.1);color:var(--danger);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition);font-size:0.9rem;border:none}
    .item-remove:hover{background:var(--danger);color:#fff}
    .cart-summary{background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);padding:32px;align-self:start;position:sticky;top:100px}
    .cart-summary h3{font-family:var(--font-heading);font-size:1.4rem;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
    .summary-row{display:flex;justify-content:space-between;margin-bottom:14px;font-size:0.95rem;color:var(--text-light)}
    .summary-row.total{border-top:1px solid var(--border);padding-top:16px;margin-top:16px;font-size:1.15rem;font-weight:700;color:var(--text-white)}
    .summary-row.total .val{color:var(--primary-light)}
    .promo-input{display:flex;gap:8px;margin:20px 0}
    .promo-input input{flex:1;padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-white);font-family:var(--font-body);font-size:0.85rem;outline:none}
    .promo-input button{padding:10px 18px;background:var(--bg-surface);color:var(--text-white);border:none;border-radius:var(--radius-sm);font-weight:600;font-size:0.85rem;cursor:pointer;transition:var(--transition)}
    .promo-input button:hover{background:var(--primary)}
    .checkout-btn{width:100%;margin-top:16px}
    .continue-btn{display:block;text-align:center;color:var(--primary-light);margin-top:12px;font-size:0.9rem;font-weight:500}
    .cart-empty{text-align:center;padding:80px 20px;grid-column:1/-1}
    .cart-empty .icon{font-size:4rem;margin-bottom:16px;opacity:0.4}
    .cart-empty h2{font-family:var(--font-heading);font-size:1.8rem;margin-bottom:12px}
    .cart-empty p{color:var(--text-muted);margin-bottom:24px}
    .trust-badges{display:flex;justify-content:center;gap:24px;margin-top:24px;flex-wrap:wrap}
    .trust-badge{display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text-muted)}
    @media(max-width:992px){.cart-layout{grid-template-columns:1fr}.cart-summary{position:static}.cart-header{display:none}.cart-item{grid-template-columns:1fr;gap:12px;text-align:center}}
  </style>
</head>
<body>
  <div id="nav-container"></div>
  <section class="page-hero">
    <div class="container">
      <h1>Shopping <span class="highlight">Cart</span></h1>
      <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Cart</span></div>
    </div>
  </section>
  <section class="container">
    <div class="cart-layout" id="cart-layout"></div>
    <div class="trust-badges" style="padding-bottom:48px">
      <span class="trust-badge">🔒 Secure Checkout</span>
      <span class="trust-badge">🚚 Free Shipping $99+</span>
      <span class="trust-badge">🔄 30-Day Returns</span>
      <span class="trust-badge">🛡️ Buyer Protection</span>
    </div>
  </section>
  <div id="footer-container"></div>
  <script src="common.js"></script>
  <script>
    document.getElementById('nav-container').innerHTML = getNavHTML('');
    document.getElementById('footer-container').innerHTML = getFooterHTML();
    function renderCart() {
      const cart = getCart();
      const layout = document.getElementById('cart-layout');
      if (!cart.length) {
        layout.innerHTML = `<div class="cart-empty"><div class="icon">🛒</div><h2>Your Cart is Empty</h2><p>Looks like you haven't added anything to your cart yet.</p><a href="shop.html" class="btn btn-primary">Start Shopping →</a></div>`;
        return;
      }
      const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
      const shipping = subtotal >= 99 ? 0 : 9.99;
      const tax = +(subtotal * 0.08).toFixed(2);
      const total = +(subtotal + shipping + tax).toFixed(2);
      let itemsHTML = `<div class="cart-items"><div class="cart-header"><span>Product</span><span>Price</span><span>Quantity</span><span>Total</span><span></span></div>`;
      cart.forEach((item, i) => {
        itemsHTML += `<div class="cart-item">
          <div class="item-info"><img src="${item.image}" alt="${item.name}"><div><h4>${item.name}</h4><span>SKU: LHS-${String(item.id).padStart(4,'0')}</span></div></div>
          <div class="item-price">$${item.price}</div>
          <div class="item-qty">
            <button onclick="changeQty(${i},-1)">−</button>
            <input type="number" value="${item.qty}" min="1" max="10" onchange="setQty(${i},this.value)">
            <button onclick="changeQty(${i},1)">+</button>
          </div>
          <div class="item-total">$${(item.price*item.qty).toFixed(2)}</div>
          <button class="item-remove" onclick="removeItem(${i})">✕</button>
        </div>`;
      });
      itemsHTML += '</div>';
      const summaryHTML = `<div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
        <div class="summary-row"><span>Shipping</span><span>${shipping===0?'<span style="color:var(--success)">FREE</span>':'$'+shipping.toFixed(2)}</span></div>
        <div class="summary-row"><span>Tax (8%)</span><span>$${tax.toFixed(2)}</span></div>
        <div class="summary-row total"><span>Total</span><span class="val">$${total.toFixed(2)}</span></div>
        <div class="promo-input"><input placeholder="Promo code"><button onclick="showToast('Promo applied!')">Apply</button></div>
        <button class="btn btn-primary checkout-btn" onclick="showToast('Checkout is a demo feature!')">Proceed to Checkout →</button>
        <a href="shop.html" class="continue-btn">← Continue Shopping</a>
      </div>`;
      layout.innerHTML = itemsHTML + summaryHTML;
    }
    function changeQty(index, delta) {
      const cart = getCart();
      cart[index].qty = Math.max(1, Math.min(10, cart[index].qty + delta));
      saveCart(cart); renderCart();
    }
    function setQty(index, val) {
      const cart = getCart();
      cart[index].qty = Math.max(1, Math.min(10, parseInt(val) || 1));
      saveCart(cart); renderCart();
    }
    function removeItem(index) {
      const cart = getCart();
      const name = cart[index].name;
      cart.splice(index, 1);
      saveCart(cart); renderCart();
      showToast(`${name} removed from cart`);
    }
    renderCart();
  </script>
</body>
</html>
